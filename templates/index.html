<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이커머스 데이터 자동 분석</title>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Pretendard', -apple-system, sans-serif; background: #f8f9fa; color: #28251D; }

        .header { background: #01696F; color: white; padding: 24px 0; }
        .header h1 { max-width: 800px; margin: 0 auto; padding: 0 20px; font-size: 24px; }
        .header p { max-width: 800px; margin: 4px auto 0; padding: 0 20px; opacity: 0.8; font-size: 14px; }

        .container { max-width: 800px; margin: 32px auto; padding: 0 20px; }

        .card { background: white; border-radius: 12px; padding: 32px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 24px; }
        .card h2 { color: #01696F; font-size: 18px; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 2px solid #E8F5F5; }

        label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 14px; color: #333; }
        input, textarea, select { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; margin-bottom: 16px; font-family: inherit; }
        input:focus, textarea:focus, select:focus { outline: none; border-color: #01696F; box-shadow: 0 0 0 3px rgba(1,105,111,0.1); }
        select { background: white; }

        .row { display: flex; gap: 16px; }
        .row > * { flex: 1; }

        .btn { background: #01696F; color: white; border: none; padding: 14px 32px; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; width: 100%; transition: all 0.2s; }
        .btn:hover { background: #015258; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }

        .file-upload-zone { border: 1px dashed #ccc; border-radius: 8px; padding: 12px; margin-bottom: 16px; background: #fafafa; }
        .file-add-btn { background: #E8F5F5; color: #01696F; border: 1px solid #01696F; border-radius: 6px; padding: 6px 16px; font-size: 13px; font-weight: 600; cursor: pointer; }
        .file-add-btn:hover { background: #01696F; color: white; }
        .file-list { margin-top: 8px; }
        .file-item { display: flex; justify-content: space-between; align-items: center; padding: 6px 8px; font-size: 13px; color: #555; background: white; border-radius: 4px; margin-top: 4px; }
        .file-item .file-name { flex: 1; }
        .file-item .file-size { color: #999; margin: 0 12px; }
        .file-item .file-remove { color: #e74c3c; cursor: pointer; font-weight: 600; border: none; background: none; font-size: 14px; }

        .result-section { display: none; }
        .download-btn { display: inline-block; background: #01696F; color: white; padding: 12px 24px; border-radius: 8px; text-decoration: none; margin: 8px 8px 8px 0; font-weight: 600; }
        .download-btn:hover { background: #015258; }

        .extra-options { display: none; margin-bottom: 16px; }
        .extra-options.show { display: block; }
        .extra-options label { font-size: 13px; }
        .check-row { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 8px; }
        .check-row label { display: flex; align-items: center; gap: 4px; font-weight: 400; font-size: 13px; cursor: pointer; margin-bottom: 0; }

        .loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); z-index: 999; justify-content: center; align-items: center; flex-direction: column; }
        .loading-overlay.show { display: flex; }
        .loading-spinner { width: 40px; height: 40px; border: 4px solid #E8F5F5; border-top: 4px solid #01696F; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-overlay p { margin-top: 16px; color: #01696F; font-weight: 600; }
    </style>
</head>
<body>
    <div class="header">
        <h1>이커머스 데이터 자동 분석</h1>
        <p>AI 그로스팀 — 리뷰 분류 · 감성 분석 · EDA 분석 · 커머스 분석 · 텍스트 분석</p>
    </div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <p id="loadingText">분석 중입니다...</p>
    </div>

    <div class="container">
        <form id="analysisForm" class="card">
            <h2>데이터 분석</h2>

            <label>분석 유형</label>
            <select id="analysisType" onchange="onTypeChange()">
                <option value="classify">리뷰 분류 — 카테고리별 자동 분류</option>
                <option value="sentiment">감성 분석 — 긍정/부정/중립 판별</option>
                <option value="eda">EDA 분석 — 데이터 정제 + 통계 + 시각화</option>
                <option value="tcp">커머스 분석 — 시간·고객·상품 기준 분석</option>
                <option value="textmining">텍스트 분석 — TF-IDF · LDA · 키워드 네트워크</option>
            </select>

            <label>데이터 파일</label>
            <div class="file-upload-zone">
                <button type="button" class="file-add-btn" onclick="document.getElementById('fileInput').click()">+ 파일 추가</button>
                <input type="file" id="fileInput" accept=".xlsx,.csv" style="display:none" onchange="onFileChange()">
                <div id="fileList" class="file-list"></div>
            </div>

            <!-- 커머스 분석 옵션 -->
            <div class="extra-options" id="tcpOpts">
                <label>분석 기준</label>
                <div class="check-row">
                    <label><input type="checkbox" class="tcp-dim" value="time" checked> 시간 분석</label>
                    <label><input type="checkbox" class="tcp-dim" value="customer" checked> 고객 분석</label>
                    <label><input type="checkbox" class="tcp-dim" value="product" checked> 상품 분석</label>
                </div>
            </div>

            <!-- 텍스트 분석 옵션 -->
            <div class="extra-options" id="tmOpts">
                <label>품사 태깅</label>
                <div class="check-row">
                    <label><input type="checkbox" class="pos-f" value="NNG" checked> 명사</label>
                    <label><input type="checkbox" class="pos-f" value="NNP" checked> 고유명사</label>
                    <label><input type="checkbox" class="pos-f" value="VA"> 형용사</label>
                    <label><input type="checkbox" class="pos-f" value="VV"> 동사</label>
                </div>
                <div class="row" style="margin-bottom:8px;">
                    <div>
                        <label>토픽 수</label>
                        <input type="range" id="tm-topics" min="3" max="10" value="5" style="margin-bottom:4px;" oninput="document.getElementById('tv').textContent=this.value">
                        <span style="font-size:12px;color:#999;">토픽: <span id="tv">5</span>개</span>
                    </div>
                    <div>
                        <label>키워드 수</label>
                        <input type="range" id="tm-topn" min="10" max="50" value="20" style="margin-bottom:4px;" oninput="document.getElementById('kv').textContent=this.value">
                        <span style="font-size:12px;color:#999;">키워드: <span id="kv">20</span>개</span>
                    </div>
                </div>
            </div>

            <button type="button" class="btn" id="submitBtn" onclick="submitAnalysis()" disabled>분석 시작</button>
        </form>

        <!-- 결과 -->
        <div id="resultSection" class="result-section"></div>
    </div>

    <script>
        function onTypeChange() {
            var t = document.getElementById('analysisType').value;
            document.getElementById('tcpOpts').className = 'extra-options' + (t === 'tcp' ? ' show' : '');
            document.getElementById('tmOpts').className = 'extra-options' + (t === 'textmining' ? ' show' : '');
        }

        function onFileChange() {
            var input = document.getElementById('fileInput');
            var list = document.getElementById('fileList');
            list.innerHTML = '';
            if (input.files.length) {
                var f = input.files[0];
                var size = f.size > 1024*1024 ? (f.size/1024/1024).toFixed(1)+'MB' : (f.size/1024).toFixed(0)+'KB';
                list.innerHTML = '<div class="file-item"><span class="file-name">' + f.name + '</span><span class="file-size">' + size + '</span><button type="button" class="file-remove" onclick="removeFile()">X</button></div>';
                document.getElementById('submitBtn').disabled = false;
            }
        }

        function removeFile() {
            document.getElementById('fileInput').value = '';
            document.getElementById('fileList').innerHTML = '';
            document.getElementById('submitBtn').disabled = true;
        }

        var NAMES = {classify:'리뷰 분류',sentiment:'감성 분석',eda:'EDA 분석',tcp:'커머스 분석',textmining:'텍스트 분석'};

        async function submitAnalysis() {
            var tab = document.getElementById('analysisType').value;
            var input = document.getElementById('fileInput');
            if (!input.files.length) return;

            var fd = new FormData();
            fd.append('file', input.files[0]);
            fd.append('chart_mode', 'static');

            if (tab === 'tcp') {
                var dims = []; document.querySelectorAll('.tcp-dim:checked').forEach(function(c){dims.push(c.value);});
                fd.append('dimensions', dims.join(',') || 'time,customer,product');
                fd.append('date_col', ''); fd.append('customer_col', ''); fd.append('product_col', '');
                fd.append('quantity_col', ''); fd.append('price_col', '');
            }
            if (tab === 'textmining') {
                fd.append('n_topics', document.getElementById('tm-topics').value || '5');
                fd.append('top_n', document.getElementById('tm-topn').value || '20');
                var posArr = []; document.querySelectorAll('.pos-f:checked').forEach(function(c){posArr.push(c.value);});
                fd.append('pos_filter', posArr.join(',') || 'NNG,NNP');
                fd.append('analyses', 'tfidf,lda,network,wordcloud,sentiment');
            }

            document.getElementById('submitBtn').disabled = true;
            document.getElementById('loadingText').textContent = (NAMES[tab] || tab) + ' 분석 중...';
            document.getElementById('loadingOverlay').classList.add('show');

            try {
                var resp = await fetch('/api/' + tab, {method: 'POST', body: fd});
                var data = await resp.json();
                if (data.status === 'ok') {
                    showResult(data);
                } else {
                    alert('분석 오류: ' + (data.message || '알 수 없는 오류'));
                }
            } catch(e) {
                alert('네트워크 오류: ' + e.message);
            } finally {
                document.getElementById('loadingOverlay').classList.remove('show');
                document.getElementById('submitBtn').disabled = false;
            }
        }

        function showResult(data) {
            var section = document.getElementById('resultSection');
            section.innerHTML = '';
            section.style.display = 'block';

            // 요약
            if (data.summary_html) {
                section.innerHTML += '<div class="card"><h2>분석 결과</h2>' + data.summary_html + '</div>';
            }

            // 차트
            if (data.charts) {
                data.charts.forEach(function(chart, i) {
                    var html = '<div class="card">';
                    if (chart.title) html += '<h2>' + chart.title + '</h2>';

                    var pData = chart.plotly || (chart.type === 'plotly' ? JSON.parse(chart.data) : null);
                    var iData = chart.image || (chart.type === 'image' ? chart.data : null);

                    // Plotly 데이터가 있으면 인터랙티브 (네트워크/3D/시계열)
                    if (pData) {
                        html += '<div id="plotly-' + i + '"></div>';
                        html += '</div>';
                        section.innerHTML += html;
                        Plotly.newPlot('plotly-' + i, pData.data, pData.layout, {responsive: true});
                    } else if (iData) {
                        html += '<img src="data:image/png;base64,' + iData + '" style="max-width:100%;border-radius:4px;">';
                        html += '</div>';
                        section.innerHTML += html;
                    }
                });
            }

            // 상세
            if (data.details_html) {
                section.innerHTML += '<div class="card"><h2>상세 결과</h2>' + data.details_html + '</div>';
            }

            // 다운로드
            if (data.job_id && data.downloads && data.downloads.length) {
                var dlHtml = '<div class="card"><h2>다운로드</h2>';
                data.downloads.forEach(function(f) {
                    dlHtml += '<a class="download-btn" href="/api/download/' + data.job_id + '/' + f.filename + '" download>' + f.label + '</a>';
                });
                section.innerHTML += dlHtml + '</div>';
            }

            section.scrollIntoView({behavior: 'smooth', block: 'start'});
        }
    </script>
</body>
</html>
